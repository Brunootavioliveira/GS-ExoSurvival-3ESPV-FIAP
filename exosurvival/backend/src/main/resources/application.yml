spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/exosurvival}
    username: ${DB_USERNAME:exosurvival}
    password: ${DB_PASSWORD:exosurvival123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:exosurvival-super-secret-key-change-in-production-min-256-bits}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.exosurvival: INFO
    org.springframework.security: WARN
