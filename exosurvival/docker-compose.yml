version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: exosurvival-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: exosurvival
      POSTGRES_USER: exosurvival
      POSTGRES_PASSWORD: exosurvival123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exosurvival -d exosurvival"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exosurvival-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/exosurvival
      DB_USERNAME: exosurvival
      DB_PASSWORD: exosurvival123
      DDL_AUTO: update
      JWT_SECRET: change-this-to-a-very-long-random-secret-in-production-min-256bits
      JWT_EXPIRATION_MS: 86400000
      PORT: 8080
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
